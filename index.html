<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fp-favicon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.ico?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForcePilot AI — Salesforce Interview Intelligence</title>
    <style>
      body {
        background-color: #030712;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: sans-serif;
      }
      .loading-indicator {
        color: #10b981;
        font-family: monospace;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.4em;
        animation: pulse 2s infinite;
        text-transform: uppercase;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.8;
          transform: scale(0.98);
        }
        50% {
          opacity: 0.2;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-indicator">Initializing ForcePilot...</div>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
